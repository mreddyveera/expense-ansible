- name: Intsall MySQL server and configuration
  hosts: mysql
  become: yes
  vars:
    mysql_password: ExpenseApp@1
  tasks:
  - name: Install mysql libralies
    ansible.builtin.pip:
      name: "{{ item }}"
      executable: pip3.9
    loop:
    - PyMySQL
    - cryptography
  - name: Install Mysql server
    ansible.builtin.package:
      name: mysql-server
      state: installed
  - name: start and enable mysql server
    ansible.builtin.service:
      name: mysqld
      state: started
      enabled: yes
  #login
  - name: connect to mysql server
    community.mysql.mysql_info:
      login_user: root
      login_password: ExpenseApp@1
      login_host: 172.31.20.18
    register: mysql_info
    ignore_errors: true
  #Print the output
  - name:
    ansible.builtin.debug:
      msg: "{{ mysql_info }}"

  - name: setup root login_password
    ansible.builtin.command: "mysql_secure_installation --set-root-pass {{ mysql_password }}"
    when: mysql_info.failed is true